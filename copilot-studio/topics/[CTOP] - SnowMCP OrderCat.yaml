kind: AdaptiveDialog
inputs:
  - kind: AutomaticTaskInput
    propertyName: AdaptiveCard
    description: >-
      The Adaptive Card JSON string returned by get_catalog_item_form (or any
      MCP tool that returns an adaptiveCard field). The orchestrator should
      bind this from the tool response when invoking this topic.
    shouldPromptUser: true

  - kind: AutomaticTaskInput
    propertyName: sysid
    name: sysid
    description: >-
      The catalog item sys_id returned by get_catalog_item_form. Used to bind
      Global.ServiceNowSelectedItemSysId so the orchestrator can pass it into
      the subsequent place_order MCP tool call.
    shouldPromptUser: true

modelDescription: >-
  Renders a ServiceNow catalog Adaptive Card returned by an MCP tool, captures
  the user's submit, and exposes the submitted values + item sys_id to the
  orchestrator via global variables so the next plan step can call place_order.

  Invoke this topic immediately after get_catalog_item_form. After EndDialog
  the orchestrator binds:
    - place_order.itemSysId = Global.ServiceNowSelectedItemSysId
    - place_order.variables = ParseJSON(Global.ServiceNowFormValuesJson)

  Why this topic is needed: chat-tuned models in autonomous mode cannot reliably
  forward an MCP tool's adaptiveCard field as a card attachment — they often
  paraphrase it as text or paste the raw JSON. A dedicated AdaptiveCardPrompt
  node makes the render and submit-capture deterministic regardless of model.

beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:

    # Render the dynamic Adaptive Card and block until the user submits.
    # Empty output/outputType is intentional: we don't bind the card's
    # individual input fields (their IDs are dynamic per catalog item), we
    # capture the entire submit payload in the next step.
    - kind: AdaptiveCardPrompt
      id: render_form_card
      card: =Topic.AdaptiveCard
      output: {}
      outputType: {}

    # Serialise the entire Activity.Value submit payload into a JSON string.
    # This sidesteps AdaptiveCardPrompt's static-binding requirement and lets
    # the topic handle any field set the catalog item exposes.
    - kind: SetVariable
      id: capture_submit
      variable: Topic.OrderForm
      value: =JSON(System.Activity.Value)

    # Expose to the orchestrator agent-wide.
    - kind: SetVariable
      id: set_global_form_values
      displayName: Set Global SNOW Form AC
      variable: Global.ServiceNowFormValuesJson
      value: =Topic.OrderForm

    - kind: SetVariable
      id: set_global_sys_id
      displayName: Set Global SysId
      variable: Global.ServiceNowSelectedItemSysId
      value: =Topic.sysid

    - kind: EndDialog
      id: end_handoff

inputType:
  properties:
    AdaptiveCard:
      displayName: AdaptiveCard
      description: >-
        The Adaptive Card JSON string returned by get_catalog_item_form (or any
        MCP tool that returns an adaptiveCard field).
      type: String

    sysid:
      displayName: sysid
      description: >-
        The catalog item sys_id returned by get_catalog_item_form.
      type: String

outputType:
  properties:
    OrderForm:
      displayName: OrderForm
      type: String
