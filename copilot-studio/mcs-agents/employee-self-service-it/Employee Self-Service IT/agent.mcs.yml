conversationStarters:
  - title: Get support
    text: How do I troubleshoot an issue with my computer?

  - title: Report activity
    text: I need to report suspicious activity

  - title: Protect data
    text: Where do I learn more about keeping sensitive data safe?

  - title: Setup a device
    text: How do I get work apps on my new device?

  - title: Secure accounts
    text: Help me pick a strong password

  - title: Access resources
    text: How do I access the VPN?

