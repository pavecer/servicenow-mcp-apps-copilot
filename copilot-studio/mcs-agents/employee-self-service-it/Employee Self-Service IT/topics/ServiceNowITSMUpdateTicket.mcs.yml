          - Use the tool `ServiceNow-ITSM-Get-User-Tickets` to get user's ticket. 
          - A ticket in the list must match with **VERY HIGH SEMANTIC RELEVANCE** to user query.
          - If the match is partial, uncertain, or low-confidence, set `RelevantTicketFound = false`.

        **Do not set `RelevantTicketFound = true` for partial, fuzzy, or ambiguous matches.**
      type: Boolean
      examples:

    State:
      displayName: State
      description: this can take two values "Active" or "Resolved", identify from user conversation if the updated ticket will be "Active" or "Resolved", if state is not identified, state will be "Active"
      type: String
      examples:

    TicketIdentifier:
      displayName: TicketIdentifier
      description: |-
        `TicketIdentifier` is a unique value used to identify a support ticket.

        There are only two valid types of TicketIdentifiers:
        1. **SysID**  
          - A globally unique 32-character identifier.  
          - Format: hexadecimal string (digits 0-9 and lowercase letters a-f).  
          - Regex: `^[a-f0-9]{32}$`
        2. **TicketNumber**  
          - A unique identifier between 8-14 characters.  
          - Format: Always starts with the prefix `INC` followed by digits.  
          - Regex: `^INC\d{5,}$`

        If neither identifier is available, use the tool `ServiceNow-ITSM-Get-User-Tickets` to extract the `TicketIdentifier` from its response.

        **Important:** The extracted `SysID` or `TicketNumber` must be an exact match with the user query. Partial or fuzzy matches are not valid.
      type: String
      examples:

outputType:
  properties:
    RelevantTicketFound:
      displayName: RelevantTicketFound
      type: Boolean
      examples: