mcs.metadata:
  componentName: ESS IT ServiceNow ITSM Update Ticket
  description: ESS IT ServiceNow ITSM Update Ticket
kind: AdaptiveDialog
inputs:
  - kind: AutomaticTaskInput
    propertyName: State
    description: this can take two values "Active" or "Resolved", identify from user conversation if the updated ticket will be "Active" or "Resolved", if state is not identified, state will be "Active"
    entity: StringPrebuiltEntity
    shouldPromptUser: false

  - kind: AutomaticTaskInput
    propertyName: Comment
    name: Comment
    description: identify the user comment and assign this variable with the comment user want to update with
    entity: StringPrebuiltEntity
    shouldPromptUser: false

  - kind: AutomaticTaskInput
    propertyName: TicketIdentifier
    description: |-
      `TicketIdentifier` is a unique value used to identify a support ticket.

      There are only two valid types of TicketIdentifiers:
      1. **SysID**  
        - A globally unique 32-character identifier.  
        - Format: hexadecimal string (digits 0-9 and lowercase letters a-f).  
        - Regex: `^[a-f0-9]{32}$`
      2. **TicketNumber**  
        - A unique identifier between 8-14 characters.  
        - Format: Always starts with the prefix `INC` followed by digits.  
        - Regex: `^INC\d{5,}$`

      If neither identifier is available, use the tool `ServiceNow-ITSM-Get-User-Tickets` to extract the `TicketIdentifier` from its response.

      **Important:** The extracted `SysID` or `TicketNumber` must be an exact match with the user query. Partial or fuzzy matches are not valid.
    entity: StringPrebuiltEntity
    shouldPromptUser: false

  - kind: AutomaticTaskInput
    propertyName: RelevantTicketFound
    description: |-
      `RelevantTicketFound` is a boolean value that indicates whether a matching ticket was found based on the user's input.

      Set `RelevantTicketFound = true` **only if** one of the following conditions is met:
      1. **Exact Identifier Match**
        - The user provides a `TicketNumber` (8-14 characters, starts with `"INC"`) or a `SysID` (32-character hexadecimal string: digits `0-9` and lowercase letters `a-f`).

      2. **High-Relevance Descriptive Match**
        - The user provides a descriptive query (e.g., "VPN related ticket").
        - Use the tool `ServiceNow-ITSM-Get-User-Tickets` to get user's ticket. 
        - A ticket in the list must match with **VERY HIGH SEMANTIC RELEVANCE** to user query.
        - If the match is partial, uncertain, or low-confidence, set `RelevantTicketFound = false`.

      **Do not set `RelevantTicketFound = true` for partial, fuzzy, or ambiguous matches.**
    entity: BooleanPrebuiltEntity
    shouldPromptUser: false

modelDescription: |-
  This tool updates a specific IT support or helpdesk ticket already identified with a unique SysId. It can be used to provide new info, add comments, or change the status of tickets.

  If the SysId for the ticket is missing, the tool ServiceNow-ITSM-Get-User-Tickets must be triggered first to retrieve the list of tickets associated with the user. 

  If SysId is still unclear, present a list in this format and ask the user to select the correct ticket:
  **{TicketNumber}** – {ShortDescription}

  In the next step, use the SysId of the relevant ticket to update the ticket using ServiceNow-ITSM-Update-Ticket tool.

  Example queries handled by this tool include:
  * "Update my support ticket"
  * "Add a comment to my ticket"
  * "Change the status of my ticket"
  * "Resolve my ticket"
  * "I want to update INC###"
  * "Can I add a comment to INC###"
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: ConditionGroup
      id: conditionGroup_2Lo78P
      conditions:
        - id: conditionItem_uye4lw
          condition: =Topic.RelevantTicketFound = true
          displayName: Is a relevant ticket found?
          actions:
            - kind: BeginDialog
              id: QUaZAR
              input:
                binding:
                  SysId: =Topic.TicketIdentifier

              dialog: msdyn_copilotforemployeeselfserviceit.topic.ServiceNowITSMSystemUserPermissionCheck
              output:
                binding:
                  TicketDetails: Topic.TicketDetails

            - kind: ConditionGroup
              id: conditionGroup_zL1Y3f
              conditions:
                - id: conditionItem_GU4cdw
                  condition: =IsBlank(Topic.State)
                  actions:
                    - kind: SetVariable
                      id: setVariable_pXG8vC
                      variable: Topic.State
                      value: ="Active"

            - kind: ConditionGroup
              id: conditionGroup_c5ryMg
              conditions:
                - id: conditionItem_yCYWPB
                  condition: =Topic.TicketDetails.State = "Closed" || Topic.TicketDetails.State = "Cancelled"
                  displayName: Check if ticket is already Cancelled or Closed
                  actions:
                    - kind: SendActivity
                      id: sendActivity_GDoMdX
                      activity: |-
                        Your support ticket was **resolved** on **{Text(DateTimeValue(Topic.TicketDetails.LastUpdated), "mmmm dd, yyyy")}**. You can't update this ticket.

                        If you still need help with an IT issue, I'm here to assist. Just let me know what you need help with.

                    - kind: CancelAllDialogs
                      id: gdJk2Y

                - id: conditionItem_XEQSI7
                  condition: =Topic.TicketDetails.State = "Resolved"
                  actions:
                    - kind: SendActivity
                      id: sendActivity_x4nhJj
                      activity: |-
                        Your support ticket was **resolved** on **{Text(DateTimeValue(Topic.TicketDetails.LastUpdated), "mmmm dd, yyyy")}**. You can reopen the ticket from the [Service Portal]({Concatenate(Topic.TicketDetails.ServiceNowPortalBaseURI,"?id=ticket&table=incident&sys_id="&Topic.TicketDetails.SysId)})

                        If you still need help with an IT issue, I'm here to assist. Just let me know what you need help with.

                    - kind: CancelAllDialogs
                      id: V6SpRF

            - kind: SendActivity
              id: sendActivity_wwRsSl
              activity: Complete the form below to add comment or resolve ticket

            - kind: SetTextVariable
              id: setVariable_nZAwIe
              variable: Topic.ITCaseTitle
              value: "IT Support Ticket #{Topic.TicketDetails.TicketNumber} | "

            - kind: AdaptiveCardPrompt
              id: UWEgCl
              card: |-
                ={
                  type: "AdaptiveCard",
                  '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
                  version: "1.5",
                  body: [
                    {
                      type: "Container",
                      items: [
                        {
                          type: "TextBlock",
                          text: Topic.ITCaseTitle,
                          weight: "Bolder"
                        },
                        {
                          type: "TextBlock",
                          text: Topic.TicketDetails.ShortDescription,
                          wrap: true,
                          weight: "Bolder",
                          size: "Medium"
                        },
                        {
                          type: "Input.Toggle",
                          title: "Resolve Ticket",
                          spacing: "Medium",
                          valueOn: "Resolved",
                          valueOff: "Active",
                          id: "state",
                          value: Topic.State
                        },
                        {
                          type: "Input.Text",
                          placeholder: "Enter comment",
                          spacing: "Medium",
                          isMultiline: true,
                          isRequired: true,
                          errorMessage: "Please enter comment",
                          label: "Add comments",
                          id: "comment",
                          value: Topic.Comment
                        }
                      ]
                    },
                    {
                      type: "Container",
                      spacing: "Medium",
                      items: [
                        {
                          type: "ActionSet",
                          actions: [
                            {
                              type: "Action.Submit",
                              title: "Submit",
                              associatedInputs: "auto"
                            },
                            {
                              type: "Action.Submit",
                              title: "Cancel",
                              associatedInputs: "none"
                            }
                          ]
                        }
                      ]
                    }
                  ]
                }
              output:
                binding:
                  actionSubmitId: Topic.actionSubmitId
                  comment: Topic.Comment
                  state: Topic.State

              outputType:
                properties:
                  actionSubmitId:
                    type: String
                    examples:

                  comment:
                    type: String
                    examples:

                  state:
                    type: String
                    examples:

            - kind: ConditionGroup
              id: conditionGroup_9qTuJB
              conditions:
                - id: conditionItem_RN14x6
                  condition: =Topic.actionSubmitId = "Cancel"
                  displayName: User clicked on cancel?
                  actions:
                    - kind: AdaptiveCardPrompt
                      id: TDsyBI
                      interruptionPolicy:
                        allowInterruption: false

                      card: |
                        ={
                          type: "AdaptiveCard",
                          '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
                          version: "1.3",
                          body: [
                            {
                              type: "TextBlock",
                              text: "Are you sure you want to cancel? Any changes you made won't be saved.",
                              wrap: true
                            },
                            {
                              type: "Container",
                              items: [
                                {
                                  type: "ActionSet",
                                  actions: [
                                    {
                                      type: "Action.Submit",
                                      title: "Yes, cancel",
                                      associatedInputs: "none"
                                    },
                                    {
                                      type: "Action.Submit",
                                      title: "No, keep editing",
                                      associatedInputs: "none"
                                    }
                                  ]
                                }
                              ]
                            }
                          ]
                        }

                                      
                      output:
                        binding:
                          actionSubmitId: Topic.actionSubmitId

                      outputType:
                        properties:
                          actionSubmitId:
                            type: String
                            examples:

                    - kind: ConditionGroup
                      id: conditionGroup_NBF0Gn
                      conditions:
                        - id: conditionItem_gwk7J3
                          condition: =Topic.actionSubmitId = "Yes, cancel"
                          actions:
                            - kind: SendActivity
                              id: sendActivity_ikOOrc
                              activity: "Ok, I’ve canceled edits to ticket #{Topic.TicketDetails.TicketNumber}. Is there anything else you need help with?"

                        - id: conditionItem_MCIGD2
                          condition: =Topic.actionSubmitId = "No, keep editing"
                          actions:
                            - kind: SendActivity
                              id: sendActivity_cv02hQ
                              activity: Let's give this another shot. Please resolve this ticket or leave a comment in the form.

                            - kind: GotoAction
                              id: YKJ9wZ
                              actionId: setVariable_nZAwIe

                      elseActions:
                        - kind: SendActivity
                          id: sendActivity_DX9eV9
                          activity: Please select one of the two suggestions.

                        - kind: GotoAction
                          id: LtCegs
                          actionId: TDsyBI

                    - kind: CancelAllDialogs
                      id: Jk5ahm

            - kind: SetVariable
              id: setVariable_RcHZvC
              variable: Topic.InputParameters
              value: |-
                =JSON(Table(
                    {
                        Name: "Comment",
                        Value: Topic.Comment
                    },
                    {
                        Name: "State",
                        Value: Topic.State
                    },
                    If(
                        Topic.State = "Resolved",
                        Table(
                            {
                                Name: "CloseNotes",
                                Value: "Incident resolved by caller from Employee Self Service"
                            },
                            {
                                Name: "ResolutionCode",
                                Value: "Resolved by Caller"
                            }
                        ),
                        Table()
                    )
                ))

            - kind: BeginDialog
              id: wKJDLk
              input:
                binding:
                  InputParameters: =Topic.InputParameters
                  SysId: =Topic.TicketDetails.SysId

              dialog: msdyn_copilotforemployeeselfserviceit.topic.ServiceNowITSMSystemUpdateTicket
              output:
                binding:
                  ServiceNowData: Topic.ServiceNowData

            - kind: ConditionGroup
              id: conditionGroup_prc8uJ
              conditions:
                - id: conditionItem_XruD9u
                  condition: =Topic.State = "Resolved"
                  displayName: Ticket has been resolved?
                  actions:
                    - kind: SendActivity
                      id: sendActivity_X7gbxW
                      activity: "Your support ticket {\"[#\"& Topic.TicketDetails.TicketNumber &\"](\"&Topic.TicketDetails.ServiceNowPortalBaseURI& \"?id=ticket&table=incident&sys_id=\"&Topic.TicketDetails.SysId&\")\"} has been resolved. Thank you for updating the status of your ticket."

              elseActions:
                - kind: SendActivity
                  id: sendActivity_CygHgL
                  activity: "Your support ticket {\"[#\"& Topic.TicketDetails.TicketNumber &\"](\"&Topic.TicketDetails.ServiceNowPortalBaseURI& \"?id=ticket&table=incident&sys_id=\"&Topic.TicketDetails.SysId&\")\"} has been updated successfully. A support agent will reach out to you soon. If you need any further assistance, just let me know. I'm here to help!"

            - kind: CancelAllDialogs
              id: EVyYOc

      elseActions:
        - kind: SetVariable
          id: setVariable_LygoHz
          variable: Topic.RelevantTicketFound
          value: false

