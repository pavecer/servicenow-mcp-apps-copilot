mcs.metadata:
  componentName: "[Example] - Crafted Response"
kind: AdaptiveDialog
modelDescription: |-
  **This topic should only trigger** when users mention **explicitly question related to compa-ratio** such as **what is my compa-ratio**, **tell my compa-ratio**.
  **Important:**
  This topic **must not** trigger for **general employment-related inquiries** such as:
  - Accessing **benefits information** (e.g., W-2 forms, health benefits),
  - **Routine workplace questions**,
  - **Performance concerns**, or
  - Other **non-sensitive** matters.
  **It should only activate** when explicit terms like **compa-ratio** is mentioned.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - what is my compa-ratio
      - what is my compa ratio
      - tell my compa-ratio

  actions:
    - kind: SetTextVariable
      id: setVariable_05OHaW
      displayName: Set Official Answer Response
      variable: Topic.VerbatimResponse
      value: Verbatim response placeholder - replace with your response.

    - kind: AdaptiveCardPrompt
      id: EZFv4Z
      displayName: Official Answer 
      card: |-
        ={
          type: "AdaptiveCard",
          '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
          version: "1.0",
          body: [
            {
              type: "ColumnSet",
              columns: [
                {
                  type: "Column",
                  width: "auto",
                  items: [
                    {
                      type: "Image",
                      url: "data:image/png;base64,"
                    }
                  ],
                  verticalContentAlignment: "Center"
                },
                {
                  type: "Column",
                  width: "stretch",
                  items: [
                    {
                      type: "TextBlock",
                      text: "Official Answer",
                      wrap: true,
                      size: "Small",
                      weight: "Lighter",
                      color: "Default",
                      isSubtle: true,
                      height: "stretch"
                    }
                  ],
                  spacing: "Small",
                  verticalContentAlignment: "Bottom"
                }
              ],
              spacing: "None",
              horizontalAlignment: "Left",
              height: "stretch"
            },
            {
              type: "TextBlock",
              text: Topic.VerbatimResponse,
              wrap: true
            }
          ]
        }
      output: {}
      outputType: {}

    - kind: EndConversation
      id: p0MQet

    - kind: EndDialog
      id: ujnAd4