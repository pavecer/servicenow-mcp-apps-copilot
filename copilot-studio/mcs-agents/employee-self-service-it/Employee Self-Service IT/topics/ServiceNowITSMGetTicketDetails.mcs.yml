mcs.metadata:
  componentName: ESS IT ServiceNow ITSM Get Ticket Details
  description: ESS IT ServiceNow ITSM Get Ticket Details
kind: AdaptiveDialog
inputs:
  - kind: ManualTaskInput
    propertyName: IconBase64
    value: data:image/svg+xml;base64,

  - kind: AutomaticTaskInput
    propertyName: TicketIdentifier
    description: |-
      `TicketIdentifier` is a unique value used to identify a support ticket.

      There are only two valid types of TicketIdentifiers:
      1. **SysID**  
        - A globally unique 32-character identifier.  
        - Format: hexadecimal string (digits 0-9 and lowercase letters a-f).  
        - Regex: `^[a-f0-9]{32}$`
      2. **TicketNumber**  
        - A unique identifier between 8-14 characters.  
        - Format: Always starts with the prefix `INC` followed by digits.  
        - Regex: `^INC\d{5,}$`

      If neither identifier is available, use the tool `ServiceNow-ITSM-Get-User-Tickets` to extract the `TicketIdentifier` from its response.

      **Important:** The extracted `SysID` or `TicketNumber` must be an exact match with the user query. Partial or fuzzy matches are not valid.
    entity: StringPrebuiltEntity
    shouldPromptUser: false

  - kind: AutomaticTaskInput
    propertyName: RelevantTicketFound
    description: |-
      `RelevantTicketFound` is a boolean value that indicates whether a matching ticket was found based on the user's input.

      Set `RelevantTicketFound = true` **only if** one of the following conditions is met:
      1. **Exact Identifier Match**
        - The user provides a `TicketNumber` (8-14 characters, starts with `"INC"`) or a `SysID` (32-character hexadecimal string: digits `0-9` and lowercase letters `a-f`).

      2. **High-Relevance Descriptive Match**
        - The user provides a descriptive query (e.g., "VPN related ticket").
        - Use the tool `ServiceNow-ITSM-Get-User-Tickets` to get user's ticket. 
        - A ticket in the list must match with **VERY HIGH SEMANTIC RELEVANCE** to user query.
        - If the match is partial, uncertain, or low-confidence, set `RelevantTicketFound = false`.

      **Do not set `RelevantTicketFound = true` for partial, fuzzy, or ambiguous matches.**
    entity: BooleanPrebuiltEntity
    shouldPromptUser: false

modelDescription: |-
  This tool provides detailed information for a specific IT support or helpdesk ticket already identified with a unique SysId. 

  If the SysId for the ticket is missing, the tool ServiceNow-ITSM-Get-User-Tickets must be triggered first to retrieve the list of tickets associated with the user. In the next step, use the SysId of the relevant ticket to acquire its detailed information using the current tool, ServiceNow-ITSM-Get-Ticket-Details. If no SysId can be found, respond to the user indicating that no tickets could be found.

  Example queries handled by this tool include:
  * “Details of my support ticket”
  * “Latest comments on my support ticket related to an issue”
  * “Show details of my IT helpdesk ticket”
  * "Information on my ticket related to an issue".
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: ConditionGroup
      id: conditionGroup_FhJ1Lt
      conditions:
        - id: conditionItem_zQrqyr
          condition: =Topic.RelevantTicketFound = true
          displayName: Is a relevant ticket found?
          actions:
            - kind: BeginDialog
              id: zZNQhm
              input:
                binding:
                  SysId: =Topic.TicketIdentifier

              dialog: msdyn_copilotforemployeeselfserviceit.topic.ServiceNowITSMSystemUserPermissionCheck
              output:
                binding:
                  TicketDetails: Topic.Details

            - kind: BeginDialog
              id: 30gNqe
              input:
                binding:
                  SysId: =Topic.Details.SysId

              dialog: msdyn_copilotforemployeeselfserviceit.topic.ServiceNowITSMSystemGetTicketDetails
              output:
                binding:
                  ServiceNowData: Topic.ServiceNowData

            - kind: ParseValue
              id: KjF1kJ
              variable: Topic.TicketDetails
              valueType:
                kind: Record
                properties:
                  AssignedTo:
                    type: String
                    examples:

                  CallerIdSystemLink:
                    type: String
                    examples:

                  Category:
                    type: String
                    examples:

                  Comments:
                    type: String
                    examples:

                  Description:
                    type: String
                    examples:

                  LastUpdated:
                    type: String
                    examples:

                  ServiceNowPortalBaseURI:
                    type: String
                    examples:

                  Severity:
                    type: String
                    examples:

                  ShortDescription:
                    type: String
                    examples:

                  State:
                    type: String
                    examples:

                  SysId:
                    type: String
                    examples:

                  TicketNumber:
                    type: String
                    examples:

              value: =Topic.ServiceNowData

            - kind: SetVariable
              id: setVariable_sxJvE8
              variable: Topic.FirstComment
              value: =First(Split(Topic.TicketDetails.Comments, Char(10) & Char(10))).Value

            - kind: SetTextVariable
              id: setVariable_1TvEFy
              variable: Topic.ITCaseTitle
              value: "IT Support Ticket #{Topic.TicketDetails.TicketNumber} | "

            - kind: SendActivity
              id: sendActivity_ly3T2X
              activity:
                text:
                  - You can view the ticket details below.
                attachments:
                  - kind: AdaptiveCardTemplate
                    cardContent: |-
                      ={
                        type: "AdaptiveCard",
                        '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
                        version: "1.3",
                        body: [
                          {
                            type: "Container",
                            items: [
                              {
                                type: "RichTextBlock",
                                inlines: [
                                  {
                                    type: "TextRun",
                                    text: Topic.ITCaseTitle,
                                    weight: "Bolder"
                                  },
                                  {
                                    type: "TextRun",
                                    text: Topic.TicketDetails.State,
                                    color: If(Topic.TicketDetails.State = "Active", "good", "default"),
                                    weight: "Bolder"
                                  }
                                ]
                              },
                              {
                                type: "TextBlock",
                                text: Topic.TicketDetails.ShortDescription,
                                wrap: true,
                                weight: "Bolder",
                                size: "Medium"
                              },
                              {
                                type: "ColumnSet",
                                columns: [
                                  {
                                    type: "Column",
                                    width: "50",
                                    items: [
                                      {
                                        type: "TextBlock",
                                        text: "Agent handling",
                                        isSubtle: true,
                                        wrap: true
                                      },
                                      {
                                        type: "TextBlock",
                                        text: If(IsBlank(Topic.TicketDetails.AssignedTo), "No agent assigned", Topic.TicketDetails.AssignedTo),
                                        wrap: true,
                                        spacing: "None"
                                      }
                                    ]
                                  },
                                  {
                                    type: "Column",
                                    width: "50",
                                    items: [
                                      {
                                        type: "TextBlock",
                                        text: "Last updated",
                                        wrap: true,
                                        isSubtle: true
                                      },
                                      {
                                        type: "TextBlock",
                                        text: Text(DateValue(Topic.TicketDetails.LastUpdated), "mmmm d, yyyy"),
                                        wrap: true,
                                        spacing: "None"
                                      }
                                    ]
                                  }
                                ]
                              },
                              If(IsBlank(Topic.TicketDetails.Description),{},{
                                type: "TextBlock",
                                text: "Description",
                                wrap: true,
                                isSubtle: true
                              }),
                              If(IsBlank(Topic.TicketDetails.Description),{},{
                                type: "TextBlock",
                                text: Topic.TicketDetails.Description,
                                wrap: true,
                                spacing: "None"
                              }),
                              If(IsBlank(Topic.TicketDetails.Comments),{},{
                                type: "TextBlock",
                                text: "Latest comment",
                                wrap: true,
                                isSubtle: true
                              }),
                              If(IsBlank(Topic.TicketDetails.Comments),{},{
                                type: "TextBlock",
                                text: Mid(Topic.FirstComment, Find(Char(10), Topic.FirstComment) + 1, Len(Topic.FirstComment)),
                                wrap: true,
                                spacing: "None"
                              }),
                              {
                                type: "TextBlock",
                                text: "SysId",
                                isVisible: false
                              },
                              {
                                type: "TextBlock",
                                text: Topic.TicketDetails.SysId,
                                isVisible: false
                              }
                            ]
                          },
                          {
                            type: "Container",
                            items: [
                              {
                                type: "ColumnSet",
                                columns: [
                                  {
                                    type: "Column",
                                    width: "auto",
                                    items: [
                                      {
                                        type: "TextBlock",
                                        text: "[Open in ServiceNow]("& Topic.TicketDetails.ServiceNowPortalBaseURI & "?id=ticket&table=incident&sys_id="&Topic.TicketDetails.SysId&")",
                                        wrap: true,
                                        weight: "Bolder"
                                      }
                                    ]
                                  },
                                  {
                                    type: "Column",
                                    width: "auto",
                                    selectAction: {
                                      type: "Action.OpenUrl",
                                      url: Topic.TicketDetails.ServiceNowPortalBaseURI &"?id=ticket&table=incident&sys_id="&Topic.TicketDetails.SysId
                                    },
                                    items: [
                                      {
                                        type: "Image",
                                        url: Topic.IconBase64
                                      }
                                    ]
                                  }
                                ]
                              }
                            ],
                            separator: true,
                            spacing: "ExtraLarge"
                          }
                        ]
                      }

            - kind: CancelAllDialogs
              id: ktH1yb

      elseActions:
        - kind: SetVariable
          id: setVariable_O0B5Ji
          variable: Topic.RelevantTicketFound
          value: false

