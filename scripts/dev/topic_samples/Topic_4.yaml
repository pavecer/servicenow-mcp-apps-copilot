kind: AdaptiveDialog
inputs:
  - kind: ManualTaskInput
    propertyName: IconBase64
    value: data:image/svg+xml;base64,

  - kind: ManualTaskInput
    propertyName: OpenedFor
    value: =System.User.DisplayName

modelDisplayName: ServiceNow HRSD Create Case
modelDescription: |-
  This tool creates a new HR case in ServiceNow.

  Trigger only if:
  - The topic is clearly HR-related (e.g., payroll, benefits, leave).
  - The user explicitly asks to create, open, or log a new HR case.
  - The request is not about IT, general help, or case updates.

  **Valid trigger examples:**
  - "Create an HR case"
  - "Open a new HR ticket"
  - "Log an HR issue"
  - "Report an HR concern"

  Do **NOT** trigger if:
  - The issue is IT-related (e.g., VPN, email, password).
  - The issue is not clearly HR-related.
  - The user is asking for info or guidance.
  - It is about updating, checking, or closing an existing case.
  - HR is mentioned, but there's no request to open a case.

  **Invalid trigger examples:**
  - "How do I reset my password?"
  - "Wi-Fi isn't working."
  - "Close my HR case."
  - "Update the payroll ticket."
  - "Change my address."

  **Note:** Service options vary by client. If unclear, ask the user to describe the issue.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: SendActivity
      id: sendActivity_XNHyAA
      activity: |-
        Sure, I can help. Let's start by understanding more about the issue you're facing. Let me gather the needed information for you. This will just take a moment.

        You'll soon see some options to help us gather the necessary details:
        1. **Center of Excellence**: Please select the appropriate option from the dropdown.
        2. **HR Service Details**:
        - Select the HR service from the dropdown.
        - Choose the contact type.
        - Enter any work notes in the text field.

    - kind: BeginDialog
      id: r9rCIg
      input:
        binding:
          CacheKey: ="HRServicesForUser"
          UserIdentifier: =Global.ESS_UserContext_UPN

      dialog: msdyn_copilotforemployeeselfservicehr.topic.ServiceNowHRSDSystemGetMetadataCached
      output:
        binding:
          CachedMetadata: Topic.CachedMetadata

    - kind: ParseValue
      id: gud3t2
      displayName: Parse HRServiceDataObject
      variable: Topic.HRServiceData
      valueType:
        kind: Table
        properties:
          active: String
          coe: String
          coe_display: String
          display: String
          sys_id: String

      value: =Topic.CachedMetadata

    - kind: SetVariable
      id: setVariable_aFZ3rA
      variable: Topic.user_selected_coe
      value: =""

    - kind: AdaptiveCardPrompt
      id: MxIyM4
      card: |-
        ={
          type: "AdaptiveCard",
          '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
          version: "1.5",
          body: [
            {
              type: "TextBlock",
              text: "Create a new HR case",
              size: "Medium",
              weight: "Bolder"
            },
            {
              type: "Input.ChoiceSet",
              choices: ForAll(
                  Distinct(Topic.HRServiceData, coe_display) As distinctCoe,
                  {
                    title: distinctCoe.Value,
                    value: LookUp(
                      Topic.HRServiceData,
                      coe_display = distinctCoe.Value,
                      coe
                    )
                  }
              ),
              placeholder: "Select a COE",
              label: "Center of Excellence",
              isRequired: true,
              errorMessage: "Please select COE",
              id: "coeSelected"
            },
            {
              type: "Container",
              separator: true,
              spacing: "ExtraLarge",
              items: [
                {
                  type: "ActionSet",
                  actions: [
                    {
                      type: "Action.Submit",
                      title: "Proceed",
                      associatedInputs: "auto",
                      style: "positive",
                      isEnabled: IsBlank(Topic.user_selected_coe)
                    }
                  ]
                }
              ]
            }
          ]
        }
      output:
        binding:
          actionSubmitId: Topic.actionProceedId
          coeSelected: Topic.user_selected_coe

      outputType:
        properties:
          actionSubmitId: String
          coeSelected: String

    - kind: AdaptiveCardPrompt
      id: Bxfm06
      card: |
        ={
          type: "AdaptiveCard",
          '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
          version: "1.5",
          body: [
           {
           type: "TextBlock",
           text: "Create a new HR Case",
           size: "Medium",
           weight: "Bolder"
           },
           {
           type: "Input.ChoiceSet",
           choices: ForAll(
            Filter(Topic.HRServiceData, coe = Topic.user_selected_coe),
            {
             title: display,
             value: sys_id
            }
           ),
           visible: false,
           placeholder: "Select a service",
           label: "Select HR service",
           isRequired: true,
           errorMessage: "Please select the type of issue",
           id: "hr_service"
           },
           {
           type: "Input.ChoiceSet",
           choices: [
              {
                title: "Phone",
                value: "phone"
              },
              {
                title: "Email",
                value: "email"
              }
            ],
           placeholder: "Placeholder text",
           label: "Preferred Contact Method",
           isRequired: true,
           errorMessage: "Please select the preferred contact method",
           value: "email",
           id: "contact_type"
           },
           {
           type: "Input.Text",
           placeholder: "Please add your work notes",
           isMultiline: true,
           errorMessage: "Please enter work notes",
           label: "Work Notes",
           id: "work_notes"
           },
           {
           type: "Container",
           separator: true,
           spacing: "ExtraLarge",
           items: [
            {
            type: "ActionSet",
            actions: [
             {
             type: "Action.Submit",
             title: "Submit",
             style: "positive",
             associatedInputs: "auto"
             },
             {
             type: "Action.Submit",
             title: "Cancel",
             style: "default",
             associatedInputs: "none"
             }
            ]
            }
           ]
           }
          ]
        }
      output:
        binding:
          actionSubmitId: Topic.actionSubmitId
          contact_type: Topic.contact_type
          hr_service: Topic.hr_service
          work_notes: Topic.work_notes

      outputType:
        properties:
          actionSubmitId: String
          contact_type: String
          hr_service: String
          work_notes: String

    - kind: ConditionGroup
      id: conditionGroup_9qTuJB
      conditions:
        - id: conditionItem_RN14x6
          condition: =Topic.actionSubmitId = "Cancel"
          actions:
            - kind: AdaptiveCardPrompt
              id: TDsyBI
              interruptionPolicy:
                allowInterruption: false

              card: |
                ={
                  type: "AdaptiveCard",
                  '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
                  version: "1.3",
                  body: [
                    {
                      type: "TextBlock",
                      text: "Are you sure you want to cancel? Any changes you made won't be saved.",
                      wrap: true
                    },
                    {
                      type: "Container",
                      items: [
                        {
                          type: "ActionSet",
                          actions: [
                            {
                              type: "Action.Submit",
                              title: "Yes, cancel",
                              associatedInputs: "none"
                            },
                            {
                              type: "Action.Submit",
                              title: "No, keep editing",
                              associatedInputs: "none"
                            }
                          ]
                        }
                      ]
                    }
                  ]
                }
              output:
                binding:
                  actionSubmitId: Topic.actionSubmitId

              outputType:
                properties:
                  actionSubmitId: String

            - kind: ConditionGroup
              id: conditionGroup_NBF0Gn
              conditions:
                - id: conditionItem_gwk7J3
                  condition: =Topic.actionSubmitId = "Yes, cancel"
                  actions:
                    - kind: SendActivity
                      id: sendActivity_ikOOrc
                      activity: Ok, I’ve canceled new HR case creation. Is there anything else you need help with?

                - id: conditionItem_MCIGD2
                  condition: =Topic.actionSubmitId = "No, keep editing"
                  actions:
                    - kind: SendActivity
                      id: sendActivity_cv02hQ
                      activity: Ok, let’s try this again. Please edit and provide clear and detailed information about your case.

                    - kind: GotoAction
                      id: 3w8dSo
                      actionId: Bxfm06

              elseActions:
                - kind: SendActivity
                  id: sendActivity_DX9eV9
                  activity: Please select one of the two suggestions.

                - kind: GotoAction
                  id: dtsZEh
                  actionId: TDsyBI

            - kind: EndConversation
              id: PyzaF7

    - kind: SetVariable
      id: setVariable_cfGgsL
      displayName: Set Input Parameters
      variable: Topic.InputParameters
      value: |-
        ="[
            { ""Name"": ""WorkNotes"", ""Value"": """&Topic.work_notes &"""},
            { ""Name"": ""HRService"", ""Value"": """&Topic.hr_service &"""},
            { ""Name"": ""ContactType"", ""Value"": """&Topic.contact_type &"""},
            { ""Name"": ""SubjectPerson"", ""Value"": """&System.User.Email &"""},
            { ""Name"": ""OpenedFor"", ""Value"": """&System.User.Email &"""}
        ]"

    - kind: SetVariable
      id: setVariable_GP4YIL
      variable: Topic.MappedScenario
      value: |-
        =Switch(
            Topic.user_selected_coe,
            "sn_hr_core_case_compensation", "msdyn_ServiceNowHRSDCreateCaseCompensation",
            "sn_hr_core_case_payroll", "msdyn_ServiceNowHRSDCreateCasePayroll",
            "sn_hr_core_case_total_rewards", "msdyn_ServiceNowHRSDCreateCaseTotalRewards",
            "sn_hr_core_case_benefits", "msdyn_ServiceNowHRSDCreateCaseBenefits",
            "sn_hr_core_case_corporate_communcations", "msdyn_ServiceNowHRSDCreateCaseCorporateCommunication",
            "sn_hr_core_case_global_mobility", "msdyn_ServiceNowHRSDCreateCaseGlobalMobility",
            "sn_hr_core_case_operations", "msdyn_ServiceNowHRSDCreateCaseOperations",
            "sn_hr_core_case_talent_management", "msdyn_ServiceNowHRSDCreateCaseTalentManagement",
            "sn_hr_core_case_workforce_admin", "msdyn_ServiceNowHRSDCreateCaseWorkforceAdmin",
            "msdyn_ServiceNowHRSDCreateCaseCore" // Default value
        )

    - kind: BeginDialog
      id: aPfpbV
      input:
        binding:
          InputParameters: =Topic.InputParameters
          ScenarioName: =Topic.MappedScenario
          UserIdentifier: =Global.ESS_UserContext_UPN

      dialog: msdyn_copilotforemployeeselfservicehr.topic.ServiceNowHRSDSystemCreateCase
      output:
        binding:
          ServiceNowData: Topic.ServiceNowData

    - kind: ParseValue
      id: ycjzaU
      variable: Topic.CaseDetails
      valueType:
        kind: Record
        properties:
          AssignedTo: String
          CaseNumber: String
          Description: String
          HRService: String
          LastUpdated: String
          OpenedFor: String
          Priority: String
          ServiceNowPortalBaseURI: String
          ShortDescription: String
          State: String
          SubjectPerson: String
          SysId: String

      value: =Topic.ServiceNowData

    - kind: SetTextVariable
      id: setVariable_hpghPE
      variable: Topic.HRCaseTitle
      value: "HR Case #{Topic.CaseDetails.CaseNumber}"

    - kind: SendActivity
      id: sendActivity_ly3T2X
      activity:
        text:
          - Your HR case is submitted and an agent will get back to you within 48 hours. You can view your case and track its status on Employee Self-Service.
        attachments:
          - kind: AdaptiveCardTemplate
            cardContent: |-
              ={
                type: "AdaptiveCard",
                '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
                version: "1.5",
                body: [
                  {
                    type: "Container",
                    items: [
                      {
                        type: "RichTextBlock",
                        inlines: [
                          {
                            type: "TextRun",
                            text: Topic.HRCaseTitle,
                            weight: "Bolder"
                          }
                        ]
                      },
                      {
                        type: "TextBlock",
                        text: Topic.CaseDetails.ShortDescription,
                        wrap: true,
                        weight: "Bolder",
                        size: "Medium"
                      },
                      {
                        type: "ColumnSet",
                        columns: [
                          {
                            type: "Column",
                            width: "50",
                            items: [
                              {
                                type: "TextBlock",
                                text: "Status",
                                isSubtle: true,
                                wrap: true
                              },
                              {
                                type: "TextBlock",
                                text: Topic.CaseDetails.State,
                                color: If(Topic.CaseDetails.State = "Active", "good", "default"),
                                wrap: true,
                                weight: "Bolder",
                                spacing: "None"
                              }
                            ]
                          },
                          {
                            type: "Column",
                            width: "50",
                            items: [
                              {
                                type: "TextBlock",
                                text: "Priority",
                                wrap: true,
                                isSubtle: true
                              },
                              {
                                type: "TextBlock",
                                text: If(IsBlank(Topic.CaseDetails.Priority), "NA", Topic.CaseDetails.Priority),
                                weight: "Bolder",
                                wrap: true,
                                spacing: "None"
                              }
                            ]
                          }
                        ]
                      },
                      {
                        type: "ColumnSet",
                        columns: [
                          {
                            type: "Column",
                            width: "50",
                            items: [
                              {
                                type: "TextBlock",
                                text: "Agent Assigned",
                                isSubtle: true,
                                wrap: true
                              },
                              {
                                type: "TextBlock",
                                text: If(IsBlank(Topic.CaseDetails.AssignedTo), "NA", ParseJSON(Topic.CaseDetails.AssignedTo).display_value),
                                wrap: true,
                                weight: "Bolder",
                                spacing: "None"
                              }
                            ]
                          },
                          {
                            type: "Column",
                            width: "50",
                            items: [
                              {
                                type: "TextBlock",
                                text: "Last updated",
                                wrap: true,
                                isSubtle: true
                              },
                              {
                                type: "TextBlock",
                                text: Text(DateValue(Topic.CaseDetails.LastUpdated), "mmmm d, yyyy"),
                                wrap: true,
                                weight: "Bolder",
                                spacing: "None"
                              }
                            ]
                          }
                        ]
                      },
                      If(IsBlank(Topic.CaseDetails.Description), {}, {
                        type: "TextBlock",
                        text: "Description",
                        wrap: true,
                        isSubtle: true
                      }),
                      If(IsBlank(Topic.CaseDetails.Description), {}, {
                        type: "TextBlock",
                        text: Topic.CaseDetails.Description,
                        wrap: true,
                        spacing: "None"
                      }),
                      {
                        type: "TextBlock",
                        text: "SysId",
                        isVisible: false
                      },
                      {
                        type: "TextBlock",
                        text: Topic.CaseDetails.SysId,
                        isVisible: false
                      }
                    ]
                  },
                  {
                    type: "Container",
                    items: [
                      {
                        type: "ColumnSet",
                        columns: [
                          {
                            type: "Column",
                            width: "auto",
                            items: [
                              {
                                type: "TextBlock",
                                text: "[Open in ServiceNow](" & Topic.CaseDetails.ServiceNowPortalBaseURI & "?id=ticket&table=sn_hr_core_case&sys_id=" & Text(Topic.CaseDetails.SysId) & ")",
                                wrap: true,
                                weight: "Bolder"
                              }
                            ]
                          },
                          {
                            type: "Column",
                            width: "auto",
                            selectAction: {
                              type: "Action.OpenUrl",
                              url: Topic.CaseDetails.ServiceNowPortalBaseURI & "?id=ticket&table=sn_hr_core_case&sys_id=" & Text(Topic.CaseDetails.SysId)
                            },
                            items: [
                              {
                                type: "Image",
                                url: Topic.IconBase64
                              }
                            ]
                          }
                        ]
                      }
                    ],
                    separator: true,
                    spacing: "Large"
                  }
                ]
              }

    - kind: EndConversation
      id: ll0ash

inputType:
  properties:
    IconBase64:
      displayName: IconBase64
      type: String

    MappedScenario:
      displayName: MappedScenario
      type: String

    OpenedFor:
      displayName: OpenedFor
      type: String

    ScenarioMapping:
      displayName: ScenarioMapping
      type:
        kind: Record
        properties:
          sn_hr_core_case: String
          sn_hr_core_case_benefits: String
          sn_hr_core_case_compensation: String
          sn_hr_core_case_corporate_communcations: String
          sn_hr_core_case_ethics: String
          sn_hr_core_case_global_mobility: String
          sn_hr_core_case_investigation: String
          sn_hr_core_case_operations: String
          sn_hr_core_case_payroll: String
          sn_hr_core_case_relations: String
          sn_hr_core_case_talent_management: String
          sn_hr_core_case_total_rewards: String
          sn_hr_core_case_workforce_admin: String
          sn_hr_le_case: String