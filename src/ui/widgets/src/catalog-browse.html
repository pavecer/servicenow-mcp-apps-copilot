<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ServiceNow Catalog</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff; --fg: #1f1f1f; --muted: #6b6b6b;
    --border: #e0e0e0; --accent: #0078d4; --accent-fg: #ffffff;
    --card-bg: #fafafa; --field-bg: #fafafa; --error: #c50f1f; --required: #c50f1f;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  html[data-theme="dark"] {
    --bg: #1f1f1f; --fg: #f3f2f1; --muted: #b3b3b3;
    --border: #3b3a39; --accent: #2899f5; --card-bg: #2a2a2a; --field-bg: #2a2a2a;
  }
  body { margin: 0; padding: 24px; background: var(--bg); color: var(--fg); }
  h1 { font-size: 16px; margin: 0 0 4px; }
  .meta { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 12px; display: flex; flex-direction: column; gap: 6px; cursor: pointer;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card .name { font-weight: 600; font-size: 14px; }
  .card .desc { font-size: 12px; color: var(--muted); line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card .cat { font-size: 11px; color: var(--muted); margin-top: auto; }
  .empty { color: var(--muted); padding: 12px 0; }
  /* Inline order form (mirrors order-form.html so a selected item renders the
     fill-in form in place, then the confirmation, without leaving the widget). */
  form { display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 13px; font-weight: 600; }
  .field .help { font-size: 12px; color: var(--muted); }
  .section { font-size: 13px; font-weight: 700; color: var(--fg);
    margin: 10px 0 -2px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  .checkbox-row { flex-direction: row; align-items: center; gap: 8px; }
  .checkbox-row input[type=checkbox] { width: 16px; height: 16px; margin: 0; flex: 0 0 auto; }
  .checkbox-row label { font-weight: 400; }
  .req { color: var(--required); margin-left: 4px; }
  input[type=text], input[type=number], input[type=email], input[type=date],
  input[type=datetime-local], textarea, select {
    background: var(--field-bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; font: inherit;
  }
  input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  textarea { min-height: 80px; resize: vertical; }
  .actions { display: flex; gap: 8px; margin-top: 8px; }
  button {
    border: 1px solid var(--border); background: var(--field-bg); color: var(--fg);
    padding: 8px 16px; border-radius: 4px; font: inherit; cursor: pointer;
  }
  button.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  button.link { background: none; border: none; color: var(--accent); padding: 8px 4px; text-decoration: underline; }
  button:disabled { opacity: 0.6; cursor: progress; }
  .btn-link { display: inline-block; text-decoration: none; border: 1px solid var(--border);
    padding: 8px 16px; border-radius: 4px; font: inherit; cursor: pointer; }
  .btn-link.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  .banner-ok { background: #107c10; color: #fff; border-radius: 6px;
    padding: 8px 12px; font-size: 13px; font-weight: 600; margin-bottom: 12px; }
  html[data-theme="dark"] .banner-ok { background: #2ea043; }
  .error { color: var(--error); font-size: 13px; }
</style>
<!-- MCP_HOST_BRIDGE -->
</head>
<body>
<div id="root"></div>
<script>
(function () {
  "use strict";
  // --- MCP Apps host bridge -------------------------------------------------
  // window.mcpHost is injected by the bundled host-bridge
  // (src/ui/widgets/bridge/host-bridge.ts). It performs the MCP Apps
  // `ui/initialize` handshake and pushes the tool result via onData().
  function host() { return (typeof window !== "undefined" && window.mcpHost) || null; }
  function getData() { var h = host(); return h ? h.getData() : null; }
  function applyTheme() { var h = host(); if (h && h.applyTheme) h.applyTheme(); }
  function callTool(name, args) {
    var h = host();
    if (h && typeof h.callTool === "function") return h.callTool(name, args || {});
    return Promise.reject(new Error("MCP Apps host bridge unavailable."));
  }
  function sendFollowUp(text) {
    var h = host();
    if (h && typeof h.sendFollowUp === "function") { try { h.sendFollowUp(text); } catch (_) {} }
  }
  // Open an external URL through the host bridge (the sandbox blocks
  // window.open / <a target=_blank> inside the widget iframe).
  function openExternal(url) {
    var h = host();
    if (h && typeof h.openExternal === "function") {
      try { if (h.openExternal(url)) return; } catch (_) {}
    }
    try { window.open(url, "_blank", "noopener"); } catch (_) {}
  }
  function subscribe(cb) {
    var h = host();
    if (h && typeof h.onData === "function") { h.onData(cb); return true; }
    return false;
  }
  function showLoading(el, msg) {
    el.innerHTML = "";
    var p = document.createElement("p"); p.className = "empty";
    p.textContent = msg || "Loading\u2026"; el.appendChild(p);
  }

  var root = document.getElementById("root");
  applyTheme();

  // The catalog-browse widget is a 3-state flow rendered IN PLACE in this one
  // widget instance: (1) the results list, (2) the selected item's order form,
  // (3) the order confirmation. Selecting an item calls get_catalog_item_form
  // via the host bridge and re-renders THIS widget as the form (the same way
  // order-form.html re-renders itself as the confirmation after place_order).
  // No new widget is mounted and no model round-trip is needed. If the host
  // gates widget-initiated tools/call, we fall back to a follow-up message so
  // the agent mounts the standalone order-form widget instead.
  var lastListData = null;       // remembers the results so "Back" can restore them
  var autoAdvanced = false;      // sole-match auto-open fires at most once

  // Extract a tool's structuredContent from whatever shape the host's callTool
  // returns (OpenAI returns the structured value directly; ext-apps returns
  // { content, structuredContent }).
  function unwrapResult(result) {
    if (result && typeof result === "object") {
      var r = result;
      if (r.structuredContent) return r.structuredContent;
      if (r.result && r.result.structuredContent) return r.result.structuredContent;
    }
    return result || {};
  }

  function backToResults() {
    if (lastListData) { renderList(lastListData); }
  }

  function addBackLink(container) {
    // Only meaningful when the user came from a multi-item list.
    if (!lastListData || !Array.isArray(lastListData.items) || lastListData.items.length < 2) return;
    var back = document.createElement("button");
    back.type = "button"; back.className = "link"; back.textContent = "\u2190 Back to results";
    back.addEventListener("click", function () { backToResults(); });
    container.appendChild(back);
  }

  // --- State 2: order form (selected item) --------------------------------
  // Fetch the item's form and render it in place. Mirrors order-form.html.
  function selectItem(item) {
    var sysId = item.sys_id || "";
    var itemName = item.name || sysId;
    if (!sysId && !itemName) return;
    showLoading(root, "Opening order form for \u201c" + itemName + "\u201d\u2026");

    // Without a sys_id we can't fetch the form directly; ask the agent.
    function fallback() {
      sendFollowUp("Open the order form for \"" + itemName + "\"" +
        (sysId ? " (catalog item sys_id " + sysId + ")" : "") + ".");
      showLoading(root, "Opening order form for \u201c" + itemName + "\u201d in chat\u2026");
    }
    if (!sysId) { fallback(); return; }

    var p;
    try { p = callTool("get_catalog_item_form", { itemSysId: sysId, userContext: (lastListData && lastListData.query) || "" }); }
    catch (e) { fallback(); return; }
    if (!p || typeof p.then !== "function") { fallback(); return; }
    p.then(function (result) {
      var formData = unwrapResult(result);
      // The form tool echoes the item name/sys_id; keep our list values as a
      // backstop so the heading is always populated.
      if (!formData.itemName) formData.itemName = itemName;
      if (!formData.itemSysId) formData.itemSysId = sysId;
      renderForm(formData);
    }).catch(function () { fallback(); });
  }

  function inputFor(field, currentValue) {
    var type = field.type || "string";
    var el;
    if (Array.isArray(field.choices) && field.choices.length > 0) {
      el = document.createElement("select");
      if (!field.required) {
        var blank = document.createElement("option"); blank.value = ""; blank.textContent = "\u2014";
        el.appendChild(blank);
      }
      field.choices.forEach(function (c) {
        var o = document.createElement("option");
        o.value = c.value != null ? String(c.value) : "";
        o.textContent = c.title || c.label || o.value;
        if (currentValue != null && String(currentValue) === o.value) o.selected = true;
        el.appendChild(o);
      });
    } else if (type === "boolean") {
      el = document.createElement("input"); el.type = "checkbox";
      el.checked = currentValue === true || currentValue === "true";
    } else if (type === "number" || type === "integer") {
      el = document.createElement("input"); el.type = "number";
      if (currentValue != null) el.value = String(currentValue);
    } else if (type === "email") {
      el = document.createElement("input"); el.type = "email";
      if (currentValue != null) el.value = String(currentValue);
    } else if (type === "date") {
      el = document.createElement("input"); el.type = "date";
      if (currentValue != null) el.value = String(currentValue);
    } else if (type === "datetime") {
      el = document.createElement("input"); el.type = "datetime-local";
      if (currentValue != null) el.value = String(currentValue);
    } else if (type === "longtext" || type === "multiline") {
      el = document.createElement("textarea");
      if (currentValue != null) el.value = String(currentValue);
    } else {
      el = document.createElement("input"); el.type = "text";
      if (currentValue != null) el.value = String(currentValue);
    }
    el.name = field.name; el.id = "f_" + field.name;
    if (field.required) el.required = true;
    return el;
  }

  function renderForm(data) {
    root.innerHTML = "";
    if (window.mcpHost && window.mcpHost.markRendered) window.mcpHost.markRendered();
    var itemName = data.itemName || data.name || "Catalog item";
    var itemSysId = data.itemSysId || data.sys_id || "";
    var fields = Array.isArray(data.fields) ? data.fields : [];
    var prefilled = (data.prefilledValues && typeof data.prefilledValues === "object") ? data.prefilledValues : {};

    var h1 = document.createElement("h1"); h1.textContent = itemName; root.appendChild(h1);

    if (fields.length === 0) {
      // No configurable options — friendly "ready to order" state.
      var p0 = document.createElement("p"); p0.className = "empty";
      p0.textContent = "No options to configure for this item \u2014 it's ready to order.";
      root.appendChild(p0);
      var act0 = document.createElement("div"); act0.className = "actions";
      var b0 = document.createElement("button");
      b0.type = "button"; b0.className = "primary"; b0.textContent = "Place order";
      b0.addEventListener("click", function () {
        b0.disabled = true; b0.textContent = "Submitting\u2026";
        placeOrder(itemName, itemSysId, {}, b0, null);
      });
      act0.appendChild(b0);
      var c0 = document.createElement("button");
      c0.type = "button"; c0.textContent = "Add to cart";
      c0.addEventListener("click", function () {
        c0.disabled = true; c0.textContent = "Adding\u2026";
        addToCart(itemName, itemSysId, {}, c0, null);
      });
      act0.appendChild(c0);
      addBackLink(act0);
      root.appendChild(act0);
      return;
    }

    if (itemSysId) {
      var meta = document.createElement("div"); meta.className = "meta";
      meta.textContent = "Item " + itemSysId.slice(0, 8) + "\u2026 \u2022 Review and submit your order";
      root.appendChild(meta);
    }

    var form = document.createElement("form");
    form.addEventListener("submit", function (ev) { ev.preventDefault(); submit(); });
    var inputs = {};

    fields.forEach(function (field) {
      if (field.type === "label") {
        var head = document.createElement("div"); head.className = "section";
        head.textContent = field.label || field.name; form.appendChild(head); return;
      }
      var input = inputFor(field, prefilled[field.name]);
      if (field.type === "boolean") {
        var crow = document.createElement("div"); crow.className = "field checkbox-row";
        var clabel = document.createElement("label"); clabel.htmlFor = "f_" + field.name;
        clabel.textContent = field.label || field.name;
        if (field.required) { var cr = document.createElement("span"); cr.className = "req"; cr.textContent = "*"; clabel.appendChild(cr); }
        crow.appendChild(input); crow.appendChild(clabel);
        if (field.help) { var ch = document.createElement("div"); ch.className = "help"; ch.textContent = field.help; crow.appendChild(ch); }
        inputs[field.name] = input; form.appendChild(crow); return;
      }
      var wrap = document.createElement("div"); wrap.className = "field";
      var label = document.createElement("label"); label.htmlFor = "f_" + field.name;
      label.textContent = field.label || field.name;
      if (field.required) { var r = document.createElement("span"); r.className = "req"; r.textContent = "*"; label.appendChild(r); }
      wrap.appendChild(label); wrap.appendChild(input);
      if (field.help) { var hp = document.createElement("div"); hp.className = "help"; hp.textContent = field.help; wrap.appendChild(hp); }
      inputs[field.name] = input; form.appendChild(wrap);
    });

    var error = document.createElement("div"); error.className = "error"; error.style.display = "none";
    form.appendChild(error);

    var actions = document.createElement("div"); actions.className = "actions";
    var submitBtn = document.createElement("button");
    submitBtn.type = "submit"; submitBtn.className = "primary"; submitBtn.textContent = "Submit order";
    actions.appendChild(submitBtn);
    var cartBtn = document.createElement("button");
    cartBtn.type = "button"; cartBtn.textContent = "Add to cart";
    cartBtn.addEventListener("click", function () {
      error.style.display = "none"; error.textContent = "";
      var vars = gatherVariables();
      cartBtn.disabled = true; cartBtn.textContent = "Adding\u2026";
      addToCart(itemName, itemSysId, vars, cartBtn, error);
    });
    actions.appendChild(cartBtn);
    addBackLink(actions);
    form.appendChild(actions);
    root.appendChild(form);

    function gatherVariables() {
      var vars = {};
      Object.keys(inputs).forEach(function (k) {
        var el = inputs[k]; var v;
        if (el.type === "checkbox") v = el.checked;
        else if (el.type === "number") v = el.value === "" ? "" : Number(el.value);
        else v = el.value;
        if (v !== "" && v !== null && v !== undefined) vars[k] = v;
      });
      return vars;
    }
    function submit() {
      error.style.display = "none"; error.textContent = "";
      var vars = gatherVariables();
      submitBtn.disabled = true; submitBtn.textContent = "Submitting\u2026";
      placeOrder(itemName, itemSysId, vars, submitBtn, error);
    }
  }

  // --- State 3: place order + confirmation --------------------------------
  // PRIMARY: place_order over the authenticated host bridge (traceable, no
  // re-auth). On success re-render THIS widget as the confirmation. FALLBACK:
  // if the host gates widget tools/call, drive it through the conversation so
  // the agent runs place_order. Never both, so an order is placed once.
  function placeOrder(name, sysId, vars, btn, errEl) {
    var settled = false;
    function fallback() {
      if (settled) return; settled = true;
      sendFollowUp(
        "Place the order for \"" + name + "\"" +
        (sysId ? " (catalog item sys_id " + sysId + ")" : "") +
        " using exactly these field values (do not change them): " +
        JSON.stringify(vars) + "."
      );
      if (btn) btn.textContent = "Submitting in chat\u2026";
    }
    var p;
    try { p = callTool("place_order", { itemSysId: sysId, variables: vars }); }
    catch (e) { fallback(); return; }
    if (!p || typeof p.then !== "function") { fallback(); return; }
    p.then(function (result) {
      if (settled) return; settled = true;
      renderConfirmation(unwrapResult(result), name);
    }).catch(function () { fallback(); });
  }

  // --- Add to cart (basket) -----------------------------------------------
  // Adds the item to the ServiceNow cart without ordering, then shows an
  // "added" panel so the user can keep browsing or go review/submit the cart.
  function addToCart(name, sysId, vars, btn, errEl) {
    var settled = false;
    function fallback() {
      if (settled) return; settled = true;
      sendFollowUp(
        "Add \"" + name + "\"" + (sysId ? " (catalog item sys_id " + sysId + ")" : "") +
        " to my cart using exactly these field values (do not change them): " +
        JSON.stringify(vars) + "."
      );
      if (btn) btn.textContent = "Adding in chat\u2026";
    }
    var p;
    try { p = callTool("add_to_cart", { itemSysId: sysId, variables: vars }); }
    catch (e) { fallback(); return; }
    if (!p || typeof p.then !== "function") { fallback(); return; }
    p.then(function (result) {
      if (settled) return; settled = true;
      var data = unwrapResult(result);
      if (data && data.success === false) { fallback(); return; }
      renderAddedToCart(name, data);
    }).catch(function () { fallback(); });
  }

  function renderAddedToCart(name, data) {
    var cart = (data && data.cart) || {};
    var count = Array.isArray(cart.items) ? cart.items.length : 0;
    root.innerHTML = "";
    if (window.mcpHost && window.mcpHost.markRendered) window.mcpHost.markRendered();
    var banner = document.createElement("div"); banner.className = "banner-ok";
    banner.textContent = "\u2713 Added \u201c" + name + "\u201d to your cart";
    root.appendChild(banner);
    if (count) {
      var meta = document.createElement("div"); meta.className = "meta";
      meta.textContent = "Your cart now has " + count + " item" + (count === 1 ? "" : "s") +
        (cart.subtotalPrice ? " \u2022 subtotal " + cart.subtotalPrice : "");
      root.appendChild(meta);
    }
    var act = document.createElement("div"); act.className = "actions";
    var review = document.createElement("button");
    review.type = "button"; review.className = "primary"; review.textContent = "Review cart";
    review.addEventListener("click", function () { reviewCart(review); });
    act.appendChild(review);
    var more = document.createElement("button");
    more.type = "button"; more.textContent = "Add more items";
    more.addEventListener("click", function () { backToResults(); });
    act.appendChild(more);
    root.appendChild(act);
  }

  function reviewCart(btn) {
    if (btn) { btn.disabled = true; btn.textContent = "Loading cart…"; }
    var p;
    try { p = callTool("view_cart", {}); }
    catch (e) { sendFollowUp("Show my ServiceNow cart."); return; }
    if (!p || typeof p.then !== "function") { sendFollowUp("Show my ServiceNow cart."); return; }
    p.then(function (result) {
      var data = unwrapResult(result);
      renderCartReview((data && data.cart) || { items: [] });
    }).catch(function () {
      sendFollowUp("Show my ServiceNow cart.");
    });
  }

  function submitCart(btn) {
    if (btn) { btn.disabled = true; btn.textContent = "Submitting…"; }
    var p;
    try { p = callTool("submit_cart", {}); }
    catch (e) { sendFollowUp("Submit my ServiceNow cart."); return; }
    if (!p || typeof p.then !== "function") { sendFollowUp("Submit my ServiceNow cart."); return; }
    p.then(function (result) {
      renderConfirmation(unwrapResult(result), "ServiceNow cart");
    }).catch(function () {
      if (btn) { btn.disabled = false; btn.textContent = "Submit cart"; }
      sendFollowUp("Submit my ServiceNow cart.");
    });
  }

  function renderCartReview(cart) {
    cart = cart || { items: [] };
    var items = Array.isArray(cart.items) ? cart.items : [];
    root.innerHTML = "";
    if (window.mcpHost && window.mcpHost.markRendered) window.mcpHost.markRendered();
    var h1 = document.createElement("h1"); h1.textContent = "Your ServiceNow cart"; root.appendChild(h1);
    var meta = document.createElement("div"); meta.className = "meta";
    meta.textContent = items.length ? (items.length + " item" + (items.length === 1 ? "" : "s") + " in your cart") : "Your cart is empty.";
    root.appendChild(meta);
    if (items.length) {
      var list = document.createElement("div"); list.className = "list";
      items.forEach(function (line) {
        var item = document.createElement("div"); item.className = "item";
        var title = document.createElement("div"); title.className = "item-title";
        title.textContent = (line.name || "Catalog item") + " × " + String(line.quantity || 1);
        item.appendChild(title);
        if (line.price) {
          var price = document.createElement("div"); price.className = "meta";
          price.textContent = line.price;
          item.appendChild(price);
        }
        list.appendChild(item);
      });
      root.appendChild(list);
      if (cart.subtotalPrice) {
        var subtotal = document.createElement("div"); subtotal.className = "meta";
        subtotal.textContent = "Subtotal \u2022 " + cart.subtotalPrice;
        root.appendChild(subtotal);
      }
    }
    var act = document.createElement("div"); act.className = "actions";
    if (items.length) {
      var submit = document.createElement("button");
      submit.type = "button"; submit.className = "primary"; submit.textContent = "Submit cart";
      submit.addEventListener("click", function () { submitCart(submit); });
      act.appendChild(submit);
    }
    var more = document.createElement("button");
    more.type = "button"; more.textContent = "Add more items";
    more.addEventListener("click", function () { backToResults(); });
    act.appendChild(more);
    root.appendChild(act);
  }

  function renderConfirmation(data, name) {
    data = data || {};
    var order = data.order || {};
    var reqNum = data.requestNumber || order.number || "";
    var link = data.link || "";
    root.innerHTML = "";
    if (window.mcpHost && window.mcpHost.markRendered) window.mcpHost.markRendered();
    var banner = document.createElement("div"); banner.className = "banner-ok";
    banner.textContent = "\u2713 Order " + (reqNum || "submitted") + " submitted to ServiceNow";
    root.appendChild(banner);
    var h = document.createElement("h1"); h.textContent = name; root.appendChild(h);
    if (reqNum) {
      var meta = document.createElement("div"); meta.className = "meta";
      meta.textContent = "Request " + reqNum + " \u2022 submitted"; root.appendChild(meta);
    }
    var act = document.createElement("div"); act.className = "actions";
    if (link) {
      var a = document.createElement("a");
      a.className = "btn-link primary"; a.textContent = "View in ServiceNow";
      a.href = link; a.target = "_blank"; a.rel = "noopener noreferrer";
      a.addEventListener("click", function (ev) { ev.preventDefault(); openExternal(link); });
      act.appendChild(a);
    }
    addBackLink(act);
    if (act.childNodes.length) root.appendChild(act);
  }

  // --- State 1: results list ----------------------------------------------
  function renderList(data) {
    root.innerHTML = "";
    if (window.mcpHost && window.mcpHost.markRendered) window.mcpHost.markRendered();
    var items = Array.isArray(data.items) ? data.items : [];

    var h1 = document.createElement("h1"); h1.textContent = "ServiceNow catalog results"; root.appendChild(h1);
    var meta = document.createElement("div"); meta.className = "meta";
    meta.textContent = items.length + " item" + (items.length === 1 ? "" : "s") +
      (data.query ? " for \u201c" + data.query + "\u201d" : "");
    root.appendChild(meta);

    if (items.length === 0) {
      var p = document.createElement("p"); p.className = "empty";
      p.textContent = "No matching catalog items. Try different keywords."; root.appendChild(p); return;
    }

    var grid = document.createElement("div"); grid.className = "grid";
    items.forEach(function (item) {
      var card = document.createElement("div"); card.className = "card";
      var name = document.createElement("div"); name.className = "name"; name.textContent = item.name || "";
      var desc = document.createElement("div"); desc.className = "desc"; desc.textContent = item.short_description || "";
      var cat = document.createElement("div"); cat.className = "cat";
      cat.textContent = (item.category || "") + (item.catalog ? " \u2022 " + item.catalog : "");
      card.appendChild(name);
      if (item.short_description) card.appendChild(desc);
      if (item.category || item.catalog) card.appendChild(cat);
      card.addEventListener("click", function () { selectItem(item); });
      grid.appendChild(card);
    });
    root.appendChild(grid);
  }

  // Entry point: receive the search_catalog_items payload.
  function render(payload) {
    var data = payload || getData();
    if (!data || typeof data !== "object") {
      root.innerHTML = "";
      var e = document.createElement("p"); e.className = "empty";
      e.textContent = "No catalog results to display."; root.appendChild(e); return;
    }
    lastListData = data;
    var items = Array.isArray(data.items) ? data.items : [];

    // Sole strong match: the server sent exactly one item plus an autoSelect
    // sys_id. Skip the list entirely and open the order form for the user.
    var autoSelect = data.autoSelect;
    if (!autoAdvanced && autoSelect && items.length === 1 &&
        (items[0].sys_id === autoSelect || !items[0].sys_id)) {
      autoAdvanced = true;
      selectItem(items[0]);
      return;
    }

    renderList(data);
  }

  showLoading(root, "Loading catalog\u2026");
  if (!subscribe(render)) { render(getData()); }
})();
</script>
</body>
</html>
