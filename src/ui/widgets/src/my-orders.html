<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>My ServiceNow Orders</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff; --fg: #1f1f1f; --muted: #6b6b6b;
    --border: #e0e0e0; --accent: #0078d4; --accent-fg: #ffffff;
    --row-hover: #f5f5f5; --chip-bg: #eef4fb; --chip-fg: #1c3c5e;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  html[data-theme="dark"] {
    --bg: #1f1f1f; --fg: #f3f2f1; --muted: #b3b3b3;
    --border: #3b3a39; --accent: #2899f5;
    --row-hover: #2a2a2a; --chip-bg: #1c3c5e; --chip-fg: #cfe5fb;
  }
  body { margin: 0; padding: 24px; background: var(--bg); color: var(--fg); }
  h1 { font-size: 16px; margin: 0 0 4px; }
  h2 { font-size: 14px; margin: 16px 0 6px; }
  .meta { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 8px; }
  button {
    border: 1px solid var(--border); background: var(--bg); color: var(--fg);
    padding: 6px 12px; border-radius: 4px; font: inherit; cursor: pointer;
  }
  button.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  button.link { background: none; border: none; color: var(--accent); padding: 6px 4px; text-decoration: underline; }
  button:disabled { opacity: 0.6; cursor: progress; }
  /* Order list rendered as cards (one widget: list -> click -> detail in place) */
  .cards { display: flex; flex-direction: column; gap: 8px; }
  .card {
    border: 1px solid var(--border); border-radius: 6px; padding: 12px;
    display: flex; flex-direction: column; gap: 4px; cursor: pointer;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card .top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .card .num { font-weight: 600; font-size: 14px; }
  .card .sd { font-size: 13px; }
  .card .desc { color: var(--muted); font-size: 12px; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card .when { color: var(--muted); font-size: 11px; }
  .chip {
    display: inline-block; padding: 2px 8px; border-radius: 12px; white-space: nowrap;
    background: var(--chip-bg); color: var(--chip-fg); font-size: 12px;
  }
  .empty { color: var(--muted); padding: 12px 0; }
  /* Detail view (ported from order-detail.html) */
  .grid {
    display: grid; grid-template-columns: max-content 1fr;
    gap: 6px 12px; font-size: 13px; margin-bottom: 16px;
  }
  .grid .k { color: var(--muted); }
  .grid .v { word-break: break-word; }
  .items, .approvals { display: flex; flex-direction: column; gap: 8px; }
  .item, .approval { border: 1px solid var(--border); border-radius: 6px; padding: 10px; }
  .item .name { font-weight: 600; font-size: 13px; }
  .item .desc { font-size: 12px; color: var(--muted); }
  .item-controls {
    display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap;
  }
  .item-controls label { font-size: 12px; color: var(--muted); }
  .qty-input {
    width: 64px; box-sizing: border-box; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 4px; padding: 4px 6px; font: inherit;
  }
  button.btn-danger { color: #b00020; border-color: #e0b4bb; }
  html[data-theme="dark"] button.btn-danger { color: #ff8a9a; border-color: #5e2a33; }
  button.btn-small { padding: 4px 10px; font-size: 12px; }
  .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .btn-link {
    display: inline-block; text-decoration: none; border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 4px; font: inherit; cursor: pointer;
  }
  .btn-link.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  .banner-ok {
    background: #107c10; color: #fff; border-radius: 6px;
    padding: 8px 12px; font-size: 13px; font-weight: 600; margin-bottom: 12px;
  }
  html[data-theme="dark"] .banner-ok { background: #2ea043; }
  textarea {
    width: 100%; box-sizing: border-box; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 4px; padding: 8px; font: inherit;
    min-height: 60px; margin-top: 8px;
  }
</style>
<!-- MCP_HOST_BRIDGE -->
</head>
<body>
<div id="root"></div>
<script>
(function () {
  "use strict";
  // --- MCP Apps host bridge (window.mcpHost from host-bridge.ts) -----------
  function host() { return (typeof window !== "undefined" && window.mcpHost) || null; }
  function getData() { var h = host(); return h ? h.getData() : null; }
  function applyTheme() { var h = host(); if (h && h.applyTheme) h.applyTheme(); }
  function callTool(name, args) {
    var h = host();
    if (h && typeof h.callTool === "function") return h.callTool(name, args || {});
    return Promise.reject(new Error("MCP Apps host bridge unavailable."));
  }
  function sendFollowUp(text) {
    var h = host();
    if (h && typeof h.sendFollowUp === "function") { try { h.sendFollowUp(text); } catch (_) {} }
  }
  // Open an external URL through the host bridge (sandbox blocks window.open /
  // <a target=_blank> inside the widget iframe).
  function openExternal(url) {
    var h = host();
    if (h && typeof h.openExternal === "function") {
      try { if (h.openExternal(url)) return; } catch (_) {}
    }
    try { window.open(url, "_blank", "noopener"); } catch (_) {}
  }
  function subscribe(cb) {
    var h = host();
    if (h && typeof h.onData === "function") { h.onData(cb); return true; }
    return false;
  }
  function showLoading(el, msg) {
    el.innerHTML = "";
    var p = document.createElement("p"); p.className = "empty";
    p.textContent = msg || "Loading\u2026"; el.appendChild(p);
  }
  function readStr(v) {
    if (v == null) return "";
    if (typeof v === "string") return v;
    if (typeof v === "object") return v.display_value || v.value || "";
    return String(v);
  }
  // Extract structuredContent from whatever shape the host's callTool returns
  // (OpenAI returns it directly; ext-apps returns { content, structuredContent }).
  function unwrapResult(result) {
    if (result && typeof result === "object") {
      var r = result;
      if (r.structuredContent) return r.structuredContent;
      if (r.result && r.result.structuredContent) return r.result.structuredContent;
    }
    return result || {};
  }

  var root = document.getElementById("root");
  applyTheme();

  // This widget is a 2-state flow rendered IN PLACE in one widget instance:
  // (1) the orders list, (2) a selected order's full detail. Clicking an order
  // calls get_order_detail via the host bridge and re-renders THIS widget as
  // the detail (the same in-place pattern catalog-browse uses for the order
  // form). No follow-up chat message and no separate widget mount. If the host
  // gates widget-initiated tools/call, we fall back to a follow-up so the agent
  // mounts the standalone order-detail widget.
  var lastListData = null;

  // Detail-view state for in-place re-render after an in-widget action
  // (comment posted, item updated/removed, cancellation requested).
  var lastDetailData = null;
  var detailBanner = null;
  var currentDetailSysId = "";

  function backToList() {
    if (lastListData) { renderList(lastListData); }
    else { showLoading(root, "Loading your orders\u2026"); }
  }

  // --- State 2: order detail (ported from order-detail.html) --------------
  function selectOrder(order) {
    var sysId = readStr(order.sys_id);
    var number = readStr(order.number) || sysId.slice(0, 8);
    showLoading(root, "Loading order " + (number || "") + "\u2026");

    function fallback() {
      sendFollowUp("Show the details for order " + (number || sysId) +
        (sysId ? " (sys_id " + sysId + ")" : "") + ".");
      showLoading(root, "Loading order " + (number || "") + " in chat\u2026");
    }
    if (!sysId) { fallback(); return; }

    var p;
    try { p = callTool("get_order_detail", { orderSysId: sysId }); }
    catch (e) { fallback(); return; }
    if (!p || typeof p.then !== "function") { fallback(); return; }
    p.then(function (result) {
      var detail = unwrapResult(result);
      // Backstop the header from the list row if the detail omitted it.
      if (!detail.order) detail.order = order;
      renderDetail(detail);
    }).catch(function () { fallback(); });
  }

  function renderDetail(data) {
    root.innerHTML = "";
    if (window.mcpHost && window.mcpHost.markRendered) window.mcpHost.markRendered();
    lastDetailData = data;
    var order = data.order || data;
    var items = Array.isArray(data.items) ? data.items
      : (Array.isArray(order.requestItems) ? order.requestItems : []);
    var approvals = Array.isArray(data.approvals) ? data.approvals : [];

    var number = readStr(order.number) || readStr(order.sys_id).slice(0, 8);
    var orderSysId = readStr(order.sys_id);
    currentDetailSysId = orderSysId;
    var state = readStr(order.state) || readStr(order.request_status);
    var sd = readStr(order.short_description);
    var desc = readStr(order.description);
    var created = readStr(order.created_on) || readStr(order.sys_created_on);
    var updated = readStr(order.updated_on) || readStr(order.sys_updated_on);

    if (detailBanner) {
      var pb = document.createElement("div"); pb.className = "banner-ok";
      pb.textContent = "\u2713 " + detailBanner; root.appendChild(pb);
      detailBanner = null;
    }

    var h1 = document.createElement("h1"); h1.textContent = "Order " + number; root.appendChild(h1);
    var meta = document.createElement("div"); meta.className = "meta";
    meta.textContent = sd || "ServiceNow request"; root.appendChild(meta);

    var grid = document.createElement("div"); grid.className = "grid";
    function row(k, v) {
      if (!v) return;
      var kEl = document.createElement("div"); kEl.className = "k"; kEl.textContent = k;
      var vEl = document.createElement("div"); vEl.className = "v"; vEl.textContent = v;
      grid.appendChild(kEl); grid.appendChild(vEl);
    }
    if (state) {
      var kEl = document.createElement("div"); kEl.className = "k"; kEl.textContent = "State";
      var vEl = document.createElement("div"); vEl.className = "v";
      var chip = document.createElement("span"); chip.className = "chip"; chip.textContent = state;
      vEl.appendChild(chip); grid.appendChild(kEl); grid.appendChild(vEl);
    }
    row("Created", created);
    row("Updated", updated);
    row("Requested for", readStr(order.requested_for));
    row("Assigned to", readStr(order.assigned_to));
    if (desc && desc !== sd) row("Description", desc);
    root.appendChild(grid);

    if (items.length > 0) {
      var ih = document.createElement("h2"); ih.textContent = "Items"; root.appendChild(ih);
      var list = document.createElement("div"); list.className = "items";
      items.forEach(function (it) {
        var itemSysId = readStr(it.sys_id);
        var card = document.createElement("div"); card.className = "item";
        var name = document.createElement("div"); name.className = "name";
        var catName = (it.catalogItem && (it.catalogItem.name || it.catalogItem.short_description)) || "";
        name.textContent = catName || readStr(it.short_description) || readStr(it.number);
        card.appendChild(name);
        var d = readStr(it.short_description) || readStr(it.description);
        if (d && d !== name.textContent) {
          var dd = document.createElement("div"); dd.className = "desc"; dd.textContent = d; card.appendChild(dd);
        }

        // Per-item edit/remove controls — same in-place pattern as the order
        // detail. Only shown when the item sys_id is known.
        if (itemSysId) {
          var ctrls = document.createElement("div"); ctrls.className = "item-controls";
          var qtyLabel = document.createElement("label"); qtyLabel.textContent = "Qty"; ctrls.appendChild(qtyLabel);
          var qty = document.createElement("input");
          qty.className = "qty-input"; qty.type = "number"; qty.min = "1";
          var qtyVal = parseInt(readStr(it.quantity), 10);
          qty.value = (qtyVal > 0 ? qtyVal : 1);
          ctrls.appendChild(qty);

          var saveBtn = document.createElement("button");
          saveBtn.className = "btn-small"; saveBtn.textContent = "Update";
          (function (itemSysId, qty, card, name, orderSysId, number) {
            saveBtn.addEventListener("click", function () {
              var newQty = parseInt(qty.value, 10);
              if (!(newQty > 0)) return;
              setBusy(card, true);
              applyOrderResult(
                tryCall("update_order_item", { orderItemSysId: itemSysId, orderSysId: orderSysId, updates: { quantity: newQty } }),
                "Item updated.",
                function () {
                  sendFollowUp("Update item " + (name.textContent || itemSysId) + " (sys_id " + itemSysId +
                    ") on order " + number + " to quantity " + newQty + ".");
                }
              );
            });
          })(itemSysId, qty, card, name, orderSysId, number);
          ctrls.appendChild(saveBtn);

          var removeBtn = document.createElement("button");
          removeBtn.className = "btn-small btn-danger"; removeBtn.textContent = "Remove";
          (function (itemSysId, card, name, orderSysId, number) {
            removeBtn.addEventListener("click", function () {
              setBusy(card, true); removeBtn.textContent = "Removing\u2026";
              applyOrderResult(
                tryCall("remove_order_item", { orderItemSysId: itemSysId, orderSysId: orderSysId }),
                "Item removed.",
                function () {
                  sendFollowUp("Remove item " + (name.textContent || itemSysId) + " (sys_id " + itemSysId +
                    ") from order " + number + ".");
                }
              );
            });
          })(itemSysId, card, name, orderSysId, number);
          ctrls.appendChild(removeBtn);

          card.appendChild(ctrls);
        }
        list.appendChild(card);
      });
      root.appendChild(list);
    }

    if (approvals.length > 0) {
      var ah = document.createElement("h2"); ah.textContent = "Approvals"; root.appendChild(ah);
      var alist = document.createElement("div"); alist.className = "approvals";
      approvals.forEach(function (ap) {
        var a = document.createElement("div"); a.className = "approval";
        a.textContent = (readStr(ap.approver) || readStr(ap.sys_id)) + " \u2014 " + (readStr(ap.state) || "pending");
        alist.appendChild(a);
      });
      root.appendChild(alist);
    }

    var notesLabel = document.createElement("h2"); notesLabel.textContent = "Add a comment"; root.appendChild(notesLabel);
    var ta = document.createElement("textarea");
    ta.placeholder = "Comment (visible to the fulfilment team)";
    root.appendChild(ta);

    var actions = document.createElement("div"); actions.className = "actions";

    var snLink = readStr(data.link);
    if (snLink) {
      var view = document.createElement("a");
      view.className = "btn-link primary";
      view.textContent = "View in ServiceNow";
      view.href = snLink; view.target = "_blank"; view.rel = "noopener noreferrer";
      view.addEventListener("click", function (ev) { ev.preventDefault(); openExternal(snLink); });
      actions.appendChild(view);
    }

    // Comment / cancel call the tools via the host bridge (the same vaulted
    // OAuth token every tool shares — no fresh auth prompt) and re-render THIS
    // detail view in place. If the host gates widget-initiated tools/call we
    // fall back to a chat follow-up so the already-authenticated agent runs it.
    var commentBtn = document.createElement("button"); commentBtn.textContent = "Post comment";
    commentBtn.addEventListener("click", function () {
      var text = ta.value.trim(); if (!text) return;
      commentBtn.disabled = true; commentBtn.textContent = "Posting\u2026";
      applyOrderResult(
        tryCall("update_order", { orderSysId: orderSysId, updates: { comments: text } }),
        "Comment posted.",
        function () {
          sendFollowUp("Add this comment to order " + number + " (sys_id " + orderSysId + "): " + text);
        }
      );
    });
    var cancelBtn = document.createElement("button"); cancelBtn.textContent = "Request cancellation";
    cancelBtn.title = "Asks fulfillment to cancel \u2014 does not change order state directly.";
    cancelBtn.addEventListener("click", function () {
      cancelBtn.disabled = true; cancelBtn.textContent = "Requesting\u2026";
      applyOrderResult(
        tryCall("update_order", { orderSysId: orderSysId, updates: { comments: "Cancellation requested by the requestor via Microsoft 365 Copilot." } }),
        "Cancellation requested.",
        function () {
          sendFollowUp("Please request cancellation of order " + number + " (sys_id " + orderSysId + ").");
        }
      );
    });
    actions.appendChild(commentBtn);
    actions.appendChild(cancelBtn);

    var back = document.createElement("button"); back.type = "button"; back.className = "link";
    back.textContent = "\u2190 Back to orders";
    back.addEventListener("click", function () { backToList(); });
    actions.appendChild(back);

    root.appendChild(actions);
  }

  // --- Detail-view in-widget action plumbing -------------------------------
  function setBusy(el, busy) {
    var nodes = (el || root).querySelectorAll("button, input, textarea");
    for (var i = 0; i < nodes.length; i++) { nodes[i].disabled = !!busy; }
  }
  function tryCall(name, args) {
    try { return callTool(name, args); }
    catch (_) { return null; }
  }
  function reRenderDetail() { if (lastDetailData) renderDetail(lastDetailData); }
  // Pull fresh order detail and re-render in place after a tool that doesn't
  // return the order-detail shape (e.g. update_order).
  function refreshDetail(sysId) {
    var p = tryCall("get_order_detail", { orderSysId: sysId });
    if (!p || typeof p.then !== "function") { reRenderDetail(); return; }
    p.then(function (r) {
      var dat = unwrapResult(r);
      if (dat && dat.order) { renderDetail(dat); } else { reRenderDetail(); }
    }).catch(function () { reRenderDetail(); });
  }
  // Resolve a tool promise: render the returned order detail when present,
  // otherwise refresh from the server (success without a body) or fall back to
  // a chat follow-up (host gated tools/call or hard failure).
  function applyOrderResult(p, okMsg, fallbackFn) {
    if (!p || typeof p.then !== "function") { if (fallbackFn) fallbackFn(); return; }
    p.then(function (result) {
      var detail = unwrapResult(result);
      if (detail && detail.order) { detailBanner = okMsg || null; renderDetail(detail); return; }
      if (detail && detail.success === true) { detailBanner = okMsg || null; refreshDetail(currentDetailSysId); return; }
      if (fallbackFn) { fallbackFn(); return; }
      reRenderDetail();
    }).catch(function () {
      if (fallbackFn) { fallbackFn(); } else { reRenderDetail(); }
    });
  }

  // --- State 1: orders list ------------------------------------------------
  function renderList(data) {
    root.innerHTML = "";
    if (window.mcpHost && window.mcpHost.markRendered) window.mcpHost.markRendered();
    var orders = Array.isArray(data.orders) ? data.orders : [];

    var h1 = document.createElement("h1"); h1.textContent = "My open ServiceNow orders"; root.appendChild(h1);
    var meta = document.createElement("div"); meta.className = "meta";
    meta.textContent = orders.length + " open order" + (orders.length === 1 ? "" : "s") +
      (orders.length ? " \u2022 newest first" : "");
    root.appendChild(meta);

    var toolbar = document.createElement("div"); toolbar.className = "toolbar";
    var refresh = document.createElement("button"); refresh.textContent = "Refresh";
    refresh.addEventListener("click", function () {
      refresh.disabled = true; refresh.textContent = "Refreshing\u2026";
      callTool("list_user_orders", {}).then(function (res) {
        var next = unwrapResult(res);
        if (next && Array.isArray(next.orders)) { lastListData = next; renderList(next); }
        else { sendFollowUp("Refresh my open orders."); }
      }).catch(function () {
        sendFollowUp("Refresh my open orders.");
      });
    });
    toolbar.appendChild(refresh);
    root.appendChild(toolbar);

    if (orders.length === 0) {
      var empty = document.createElement("p"); empty.className = "empty";
      empty.textContent = "You don't have any open orders.";
      root.appendChild(empty); return;
    }

    var cards = document.createElement("div"); cards.className = "cards";
    orders.forEach(function (order) {
      var number = readStr(order.number) || readStr(order.sys_id).slice(0, 8);
      var sd = readStr(order.short_description);
      var desc = readStr(order.description);
      var state = readStr(order.state) || readStr(order.request_status) || "open";
      var updated = readStr(order.updated_on) || readStr(order.sys_updated_on) ||
        readStr(order.created_on) || readStr(order.sys_created_on);

      var card = document.createElement("div"); card.className = "card";
      var top = document.createElement("div"); top.className = "top";
      var num = document.createElement("span"); num.className = "num"; num.textContent = number;
      var chip = document.createElement("span"); chip.className = "chip"; chip.textContent = state;
      top.appendChild(num); top.appendChild(chip);
      card.appendChild(top);
      if (sd) { var sdEl = document.createElement("div"); sdEl.className = "sd"; sdEl.textContent = sd; card.appendChild(sdEl); }
      if (desc && desc !== sd) { var dEl = document.createElement("div"); dEl.className = "desc"; dEl.textContent = desc; card.appendChild(dEl); }
      if (updated) { var w = document.createElement("div"); w.className = "when"; w.textContent = "Updated " + updated; card.appendChild(w); }
      card.addEventListener("click", function () { selectOrder(order); });
      cards.appendChild(card);
    });
    root.appendChild(cards);
  }

  // Entry point: receive the list_user_orders payload.
  function render(payload) {
    var data = payload || getData();
    if (!data || typeof data !== "object") {
      root.innerHTML = "";
      var e = document.createElement("p"); e.className = "empty";
      e.textContent = "No orders to display."; root.appendChild(e); return;
    }
    lastListData = data;
    renderList(data);
  }

  showLoading(root, "Loading your orders\u2026");
  if (!subscribe(render)) { render(getData()); }
})();
</script>
</body>
</html>
