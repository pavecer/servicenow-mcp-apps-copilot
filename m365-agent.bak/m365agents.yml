# Microsoft 365 Agents Toolkit project definition for the ServiceNow MCP
# declarative agent + MCP Apps widgets. See:
#   https://aka.ms/teamsfx-yml
#
# This file is intentionally minimal. The Agents Toolkit VS Code extension
# (TeamsDevApp.ms-teams-vscode-extension v6.6.1+) drives the lifecycle:
#   1. Provision   → creates the Teams app + uploads appPackage/
#   2. Deploy      → no-op here; the MCP server is deployed separately via
#                    the repo's existing scripts/deploy-azure.ps1
#   3. Publish     → publishes the declarative agent to your M365 tenant.
#
# The MCP server endpoint and OAuth registration id are read from env/.env.dev.
version: 1.0.0

projectId: 7c6e8a32-1c1f-4f5b-9b1e-aabbccddeeff

environmentFolderPath: ./env

provision:
  - uses: file/createOrUpdateEnvironmentFile
    with:
      target: ./env/.env.${{TEAMSFX_ENV}}
      envs:
        # These are referenced from appPackage/ files via ${{ … }} placeholders.
        MCP_SERVER_URL: ${{MCP_SERVER_URL}}
        MCP_SERVER_DOMAIN: ${{MCP_SERVER_DOMAIN}}
        OAUTH_REGISTRATION_ID: ${{OAUTH_REGISTRATION_ID}}

  - uses: teamsApp/create
    with:
      name: ServiceNow Catalog (MCP)
    writeToEnvironmentFile:
      teamsAppId: TEAMS_APP_ID

  - uses: teamsApp/zipAppPackage
    with:
      manifestPath: ./appPackage/manifest.json
      outputZipPath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
      outputFolder: ./appPackage/build

  - uses: teamsApp/validateAppPackage
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip

  - uses: teamsApp/update
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip

publish:
  - uses: teamsApp/zipAppPackage
    with:
      manifestPath: ./appPackage/manifest.json
      outputZipPath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
      outputFolder: ./appPackage/build
  - uses: teamsApp/publishAppPackage
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
    writeToEnvironmentFile:
      publishedAppId: TEAMS_APP_PUBLISHED_ID
